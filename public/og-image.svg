<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9179ff" />
      <stop offset="100%" stop-color="#5d3ef8" />
    </linearGradient>
    
    <radialGradient id="purple-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5d3ef8" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#050512" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="blue-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#050512" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#050512" />

  <circle cx="200" cy="200" r="400" fill="url(#purple-glow)" />
  <circle cx="1000" cy="450" r="450" fill="url(#blue-glow)" />

  <rect x="40" y="40" width="1120" height="550" rx="24" fill="#0c0c1e" fill-opacity="0.4" stroke="#16162e" stroke-width="2" />

  <text x="90" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" letter-spacing="-1">
    <tspan fill="#ffffff">E</tspan><tspan fill="#5d3ef8">K</tspan>
  </text>

  <g transform="translate(90, 160)">
    <rect width="210" height="32" rx="16" fill="#0c0c1e" stroke="#16162e" stroke-width="1" />
    <circle cx="20" cy="16" r="4" fill="#3b82f6" />
    <text x="34" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#3b82f6" letter-spacing="0.5">AVAILABLE FOR WORK</text>
  </g>

  <text x="90" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-1.5">
    I build scalable web applications
  </text>
  <text x="90" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-1.5">
    and MVPs that solve <tspan fill="url(#text-grad)">business problems</tspan>
  </text>

  <text x="90" y="470" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#64748b" letter-spacing="0.5">
    React/Vue  •  TypeScript  •  Node.js
  </text>

  <text x="1110" y="535" text-anchor="end" font-family="monospace" font-size="16" font-weight="600" fill="#5d3ef8" letter-spacing="1">
    EGORKROTOV.DEV
  </text>
